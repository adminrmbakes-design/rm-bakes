<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        RM Bakes • Add Product

    </title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700;800&display=swap"
        rel="stylesheet"
    >

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;

        }

        body{

            min-height:100vh;

            background:

                radial-gradient(
                    circle at top,
                    rgba(0,255,200,0.08),
                    transparent 35%
                ),

                linear-gradient(
                    135deg,
                    #050505,
                    #0c0c0c,
                    #121212
                );

            color:white;

            font-family:'Inter', sans-serif;

        }

        body::before{

            content:"";

            position:fixed;

            inset:0;

            background-image:

                linear-gradient(
                    rgba(255,255,255,0.03) 1px,
                    transparent 1px
                ),

                linear-gradient(
                    90deg,
                    rgba(255,255,255,0.03) 1px,
                    transparent 1px
                );

            background-size:40px 40px;

            opacity:0.18;

            pointer-events:none;

        }

        .topbar{

            position:sticky;

            top:0;

            z-index:100;

            display:flex;

            justify-content:space-between;

            align-items:center;

            padding:20px 28px;

            background:

                rgba(0,0,0,0.65);

            backdrop-filter:blur(18px);

            border-bottom:

                1px solid rgba(255,255,255,0.06);

        }

        .title{

            font-family:'Orbitron', sans-serif;

            font-size:1.4rem;

            letter-spacing:2px;

        }

        .dashboard-btn{

            text-decoration:none;

            padding:12px 18px;

            border-radius:16px;

            color:white;

            background:

                rgba(255,255,255,0.08);

            border:

                1px solid rgba(255,255,255,0.08);

        }

        .container{

            width:92%;

            max-width:900px;

            margin:40px auto;

        }

        .form-card{

            background:

                rgba(255,255,255,0.04);

            border:

                1px solid rgba(255,255,255,0.06);

            border-radius:30px;

            padding:32px;

            backdrop-filter:blur(18px);

        }

        .form-title{

            font-size:1.3rem;

            font-weight:700;

            margin-bottom:10px;

        }

        .form-description{

            color:

                rgba(255,255,255,0.55);

            margin-bottom:30px;

            line-height:1.8;

        }

        .form-group{

            margin-bottom:22px;

        }

        .form-group label{

            display:block;

            margin-bottom:10px;

            font-weight:600;

        }

        .form-control{

            width:100%;

            padding:16px;

            border:none;

            outline:none;

            border-radius:18px;

            color:white;

            background:

                rgba(255,255,255,0.06);

            border:

                1px solid rgba(255,255,255,0.06);

        }

        /* =====================================
        PRODUCT MARKETING
        ===================================== */

        .marketing-options{

            display:flex;

            flex-direction:column;

            gap:14px;

        }

        .marketing-item{

            display:flex;

            align-items:center;

            gap:12px;

            padding:16px;

            border-radius:18px;

            cursor:pointer;

            background:

                rgba(255,255,255,0.05);

            border:

                1px solid rgba(255,255,255,0.06);

        }

        .marketing-item input{

            width:18px;

            height:18px;

            cursor:pointer;

        }

        textarea.form-control{

            resize:vertical;

            min-height:140px;

        }

        .save-btn{

            width:100%;

            border:none;

            cursor:pointer;

            padding:18px;

            border-radius:20px;

            font-size:1rem;

            font-weight:700;

            color:black;

            background:

                linear-gradient(
                    135deg,
                    #00ffd0,
                    #00f0ff
                );

            box-shadow:

                0 0 25px rgba(
                    0,
                    255,
                    208,
                    0.25
                );

            transition:0.3s;

        }

        .save-btn:hover{

            transform:
                translateY(-2px);

        }

        .flash-wrapper{

            width:92%;

            max-width:900px;

            margin:20px auto;

        }

        .flash{

            padding:16px;

            border-radius:18px;

            margin-bottom:14px;

            background:

                rgba(0,255,180,0.1);

            border:

                1px solid rgba(
                    0,
                    255,
                    180,
                    0.15
                );

            color:#8ffff0;

        }

        @media(max-width:700px){

            .topbar{

                flex-direction:column;

                align-items:flex-start;

                gap:15px;

            }

        }

    </style>

</head>

<body>

{% with messages = get_flashed_messages(with_categories=true) %}

{% if messages %}

<div class="flash-wrapper">

{% for category, message in messages %}

<div class="flash">

{{ message }}

</div>

{% endfor %}

</div>

{% endif %}

{% endwith %}

<div class="topbar">

    <div class="title">

        ADD PRODUCT

    </div>

    <a

        href="{{ url_for('admin.admin_dashboard') }}"

        class="dashboard-btn"

    >

        ← Dashboard

    </a>

</div>

<div class="container">

    <div class="form-card">

        <div class="form-title">

            🍰 Create New Product

        </div>

        <div class="form-description">

            Add a new dessert, brownie,
            cake or signature product
            to RM Bakes.

        </div>

        <form

            method="POST"

            enctype="multipart/form-data"

        >

            <div class="form-group">

                <label>

                    Product Name

                </label>

                <input

                    type="text"

                    name="product_name"

                    class="form-control"

                    required

                >

            </div>

            <div class="form-group">

                <label>

                    Description

                </label>

                <textarea

                    name="product_description"

                    class="form-control"

                    required

                ></textarea>

            </div>

            <div class="form-group">

                <label>

                    Price (₹)

                </label>

                <input

                    type="number"

                    step="0.01"

                    name="product_price"

                    class="form-control"

                    required

                >

            </div>

            <div class="form-group">

                <label>

                    Unit

                </label>

                <input

                    type="text"

                    name="product_unit"

                    placeholder="500g, 1kg, 6 pcs..."

                    class="form-control"

                    required

                >

            </div>

            <!-- =====================================
                       CATEGORY SELECTOR
            ====================================== -->

            <div class="form-group"
                 id="categorySelectContainer"
            >

                <label>

                   Category

                </label>

                <select

                    name="product_category"

                    id="categorySelect"

                    class="form-control"

                >

                    {% for category in categories %}

                    <option value="{{ category }}">

                        {{ category }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <!-- =====================================
            ADD NEW CATEGORY BUTTON
            ====================================== -->

            <div class="form-group">

                <button

                    type="button"

                    id="showCategoryInput"

                    class="save-btn"

                    style="
                    margin-top:0;
                    padding:14px;"

                >

                   ➕ Add New Category

                </button>

            </div>

            <!-- =====================================
            HIDDEN CATEGORY INPUT
            ====================================== -->

            <div

                class="form-group"
                id="newCategoryContainer"
                style="display:none;"
                
            >

                <label>

                    New Category

                </label>

                <input

                    type="text"

                    name="new_category"

                    class="form-control"

                    placeholder="Example: Kunafa"

                >

            </div>

            

            <div class="form-group">

                <label>

                    Tags

                </label>

                <input

                    type="text"

                    name="product_tags"

                    placeholder="Chocolate, Premium, Bestseller..."

                    class="form-control"

                >

            </div>

            <!-- =====================================
            PRODUCT MARKETING
            ===================================== -->

            <div class="form-group">

                <label>

                    Product Marketing

                </label>

                <div class="marketing-options">

                    <label class="marketing-item">

                        <input
                            type="radio"
                            name="marketing_type"
                            value="none"
                            checked
                        >

                        ✨ Regular Product

                    </label>

                    <label class="marketing-item">

                        <input
                            type="radio"
                            name="marketing_type"
                            value="launching"
                        >

                        🚀 Launching Product

                    </label>

                    <label class="marketing-item">

                        <input
                            type="radio"
                            name="marketing_type"
                            value="seasonal"
                        >

                        🍂 Seasonal Product

                    </label>

                    <label class="marketing-item">

                        <input
                            type="radio"
                            name="marketing_type"
                            value="festive"
                        >

                        🎉 Festive Product

                    </label>

                </div>

            </div>

            <div class="form-group">

                <label>

                    Product Image

                </label>

                <input

                    type="file"

                    name="product_image"

                    accept="image/*"

                    class="form-control"

                    required

                >

            </div>

            <button

                type="submit"

                class="save-btn"

            >

                Save Product 🍰

            </button>

        </form>

    </div>

</div>


    <!-- ===== JAVASCRIPT ===== -->

<script>

const addCategoryBtn =
    document.getElementById(
        "showCategoryInput"
    );

const categoryContainer =
    document.getElementById(
        "newCategoryContainer"
    );

const categorySelectContainer =
    document.getElementById(
        "categorySelectContainer"
    );

let addingNewCategory = false;

addCategoryBtn.addEventListener(

    "click",

    function(){

        addingNewCategory =
            !addingNewCategory;

        if(addingNewCategory){

            categoryContainer.style.display =
                "block";

            categorySelectContainer.style.display =
                "none";

            addCategoryBtn.innerHTML =
                "❌ Cancel New Category";

        }

        else{

            categoryContainer.style.display =
                "none";

            categorySelectContainer.style.display =
                "block";

            addCategoryBtn.innerHTML =
                "➕ Add New Category";

        }

    }

);

</script>

    

</body>

</html>
