{% extends "base.html" %}

{% block content %}


  


   



<!-- JAVASCRIPT -->

<script>

function showToast(message){

    const toast = document.createElement("div");

    toast.className =
        "custom-toast show";

    toast.innerText =
        message;

    document.body.appendChild(toast);

    setTimeout(() => {

        toast.remove();

    }, 2200);
}



/* =========================
   UPDATE TOTALS
========================= */

function updateTotals(
    cartId,
    quantity,
    price
){

    const itemTotal =
        quantity * price;

    document.getElementById(
        `item-total-${cartId}`
    ).innerText =

        `Item Total: ₹${itemTotal}`;



    // =====================
    // RECALCULATE CART TOTAL
    // =====================

    let grandTotal = 0;

    document.querySelectorAll(
        ".item-total"
    ).forEach(item => {

        const value =
            parseFloat(

                item.innerText.replace(
                    "Item Total: ₹",
                    ""
                )

            );

        grandTotal += value;

    });

    document.getElementById(
        "cart-total"
    ).innerText =

        `Total: ₹${grandTotal}`;
}



/* =========================
   INCREASE QUANTITY
========================= */

async function increaseQuantity(
    cartId,
    price
){

    const response = await fetch(

        `/increase_quantity/${cartId}`,

        {
            method: "POST"
        }

    );

    const data =
        await response.json();

    if(data.success){

        const qtyElement =
            document.getElementById(
                `qty-${cartId}`
            );

        qtyElement.innerText =
            data.quantity;

        updateTotals(

            cartId,
            data.quantity,
            price

        );

        showToast(data.message);
    }
}



/* =========================
   DECREASE QUANTITY
========================= */

async function decreaseQuantity(
    cartId,
    price
){

    const qtyElement =
        document.getElementById(
            `qty-${cartId}`
        );

    let currentQty =
        parseInt(
            qtyElement.innerText
        );



    if(currentQty <= 1){

        const confirmRemove = confirm(
            "Your item will be removed from the cart 😭"
        );

        if(!confirmRemove){

            return;
        }
    }



    const response = await fetch(

        `/decrease_quantity/${cartId}`,

        {
            method: "POST"
        }

    );

    const data =
        await response.json();



    if(data.success){

        // =====================
        // ITEM REMOVED
        // =====================

        if(data.quantity <= 0){

            const card =
                document.getElementById(
                    `cart-card-${cartId}`
                );

            if(card){

                card.remove();
            }

        }

        else{

            qtyElement.innerText =
                data.quantity;

            updateTotals(

                cartId,
                data.quantity,
                price

            );
        }

        showToast(data.message);
    }
}



/* =========================
   REMOVE ITEM
========================= */

async function removeItem(cartId){

    const confirmRemove = confirm(

        "Remove this delicious item from cart? 😭"

    );

    if(!confirmRemove){

        return;
    }

    const response = await fetch(

        `/remove_item/${cartId}`,

        {
            method: "POST"
        }

    );

    const data =
        await response.json();

    if(data.success){

        const card =
            document.getElementById(
                `cart-card-${cartId}`
            );

        if(card){

            card.remove();
        }

        showToast(data.message);

        setTimeout(() => {

            location.reload();

        }, 500);
    }
}



/* =========================
   SAVE NOTE
========================= */

async function saveNote(cartId){

    const noteBox =
        document.getElementById(
            `note-${cartId}`
        );

    const note =
        noteBox.value.trim();

    if(note === ""){

        showToast(
            "Please enter a note 😭"
        );

        return;
    }

    const formData =
        new FormData();

    formData.append(
        "note",
        note
    );

    const response = await fetch(

        `/update-cart-note/${cartId}`,

        {
            method: "POST",
            body: formData
        }

    );

    const data =
        await response.json();

    if(data.success){

        showToast(data.message);

        noteBox.setAttribute(
            "readonly",
            true
        );

        const actions =
            document.getElementById(
                `note-actions-${cartId}`
            );

        actions.innerHTML = `

            <button
                class="delete-note-btn"
                onclick="deleteNote(${cartId})"
            >

                Delete Note 🗑️

            </button>

        `;
    }
}



/* =========================
   DELETE NOTE
========================= */

async function deleteNote(cartId){

    const confirmDelete = confirm(
        "Delete this note? 😭"
    );

    if(!confirmDelete){

        return;
    }

    const response = await fetch(

        `/delete-cart-note/${cartId}`,

        {
            method: "POST"
        }

    );

    const data =
        await response.json();

    if(data.success){

        showToast(data.message);

        const noteBox =
            document.getElementById(
                `note-${cartId}`
            );

        noteBox.value = "";

        noteBox.removeAttribute(
            "readonly"
        );

        const actions =
            document.getElementById(
                `note-actions-${cartId}`
            );

        actions.innerHTML = `

            <button
                class="save-note-btn"
                onclick="saveNote(${cartId})"
            >

                Save Note ✨

            </button>

        `;
    }
}

</script>

{% endblock %}
