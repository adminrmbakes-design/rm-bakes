{% extends "base.html" %}

{% block content %}

<div class="review-page">

    <!-- =====================================
         HERO
    ====================================== -->

    <section class="review-hero">

        <div class="review-heart">

            ✏️

        </div>

        <h1 class="review-title">

            Edit Your Sweet Memory

        </h1>

        <p class="review-subtitle">

            Every dessert tells a story.
            Refine yours with love 💖
        </p>

    </section>



    <!-- =====================================
         REVIEW CARD
    ====================================== -->

    <div class="review-card">

        <form method="POST">

            <h2 class="review-section-title">

                🌸 Update Your Rating

            </h2>

            <div class="star-rating">

                {% for i in range(1,6) %}

                <span
                    class="star review-star {% if review.rating >= i %}filled{% endif %}"
                    onclick="selectRating({{ i }})"
                >

                    {% if review.rating >= i %}
                        ⭐
                    {% else %}
                        ☆
                    {% endif %}

                </span>

                {% endfor %}

            </div>

            <input
                type="hidden"
                name="rating"
                id="rating"
                value="{{ review.rating }}"
            >



            <!-- =============================
                 REVIEW TEXT
            ============================== -->

            <h2
                class="review-section-title"
                style="margin-top:28px;"
            >

                💌 Your Sweet Story

            </h2>

            <textarea
                name="review_text"
                class="review-textarea"
                placeholder="Tell us your sweet story..."
            >{{ review.review_text }}</textarea>



            <!-- =============================
                 ACTIONS
            ============================== -->

            <div class="action-grid">

                <button
                    type="submit"
                    class="submit-review-btn"
                >

                    Save Changes 💖

                </button>

                <a
                    href="{{ url_for(
                        'review.my_review',
                        order_id=review.order_id
                    ) }}"
                    class="cancel-btn"
                >

                    Cancel 🌷

                </a>

            </div>

        </form>

    </div>

</div>



<style>

/* ========================================
   PAGE
======================================== */

.review-page{

    max-width:850px;

    margin:auto;

    padding:24px;

}



/* ========================================
   HERO
======================================== */

.review-hero{

    text-align:center;

    margin-bottom:30px;

}

.review-heart{

    font-size:4rem;

    animation:pulse 2s infinite;

}

.review-title{

    color:#ffd9f2;

    font-weight:900;

}

.review-subtitle{

    color:#f6d7a7;

}



/* ========================================
   CARD
======================================== */

.review-card{

    background:
        linear-gradient(
            135deg,
            rgba(255,192,203,0.12),
            rgba(255,215,0,0.08)
        );

    border-radius:28px;

    padding:30px;

    backdrop-filter:blur(16px);

    border:
        1px solid rgba(
            255,
            215,
            180,
            0.15
        );

}



/* ========================================
   TITLES
======================================== */

.review-section-title{

    color:#ffd9f2;

    margin-bottom:18px;

}



/* ========================================
   STAR RATING
======================================== */

.star-rating{

    display:flex;

    justify-content:center;

    gap:12px;

}

.star{

    width:60px;

    height:60px;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    cursor:pointer;

    font-size:2rem;

    background:
        rgba(255,255,255,0.08);

    transition:0.3s;

}

.star:hover{

    transform:scale(1.08);

}

.star.filled{

    color:#ffd700;

    background:
        linear-gradient(
            135deg,
            #ff9bd2,
            #ffd67d
        );

    box-shadow:
        0 0 20px
        rgba(
            255,
            215,
            0,
            0.7
        );

}



/* ========================================
   TEXTAREA
======================================== */

.review-textarea{

    width:100%;

    min-height:180px;

    resize:none;

    margin-top:12px;

    padding:18px;

    border:none;

    border-radius:20px;

    background:
        rgba(255,255,255,0.08);

    color:white;

    font-size:1rem;

}



/* ========================================
   ACTIONS
======================================== */

.action-grid{

    display:grid;

    grid-template-columns:
        repeat(2,1fr);

    gap:16px;

    margin-top:28px;

}

.submit-review-btn{

    border:none;

    border-radius:20px;

    padding:16px;

    cursor:pointer;

    font-weight:800;

    background:
        linear-gradient(
            135deg,
            #ff9bd2,
            #ffd67d
        );

    color:#222;

}

.cancel-btn{

    display:flex;

    align-items:center;

    justify-content:center;

    text-decoration:none;

    border-radius:20px;

    font-weight:800;

    background:
        rgba(255,255,255,0.08);

    color:white;

}



/* ========================================
   ANIMATION
======================================== */

@keyframes pulse{

    0%{

        transform:scale(1);

    }

    50%{

        transform:scale(1.08);

    }

    100%{

        transform:scale(1);

    }

}

</style>



<script>

function selectRating(rating){

    document
        .getElementById(
            "rating"
        )
        .value = rating;

    const stars =

        document.querySelectorAll(
            ".review-star"
        );

    stars.forEach(

        (star,index)=>{

            if(index < rating){

                star.innerHTML = "⭐";

                star.classList.add(
                    "filled"
                );

            }

            else{

                star.innerHTML = "☆";

                star.classList.remove(
                    "filled"
                );

            }

        }

    );

}

</script>

{% endblock %}
