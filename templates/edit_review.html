{% extends "base.html" %}
{% block content %}

<a href="{{ url_for('review.my_review', order_id=order.order_id) }}" class="detail-back-btn"><i class="fa-solid fa-arrow-left"></i> Back to My Review</a>

<div class="rm-page-hero">
  <h1>Edit Review</h1>
  <p>Update your feedback for Order #{{ order.order_number }}</p>
</div>

<div class="leave-review-wrap">

  <!-- CURRENT RATING -->
  <div class="review-section-card">
    <div style="font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--maroon);margin-bottom:16px;">Update Your Star Rating</div>
    <div class="star-row" id="starRow">
      {% for i in range(1,6) %}
      <button type="button" class="rv-star {% if review.rating >= i %}filled{% endif %}" data-value="{{ i }}" onclick="setRating({{ i }})"></button>
      {% endfor %}
    </div>
    <p id="ratingLabel" style="text-align:center;font-size:0.88rem;color:var(--text-muted);margin-top:10px;">Current: {{ review.rating }}/5</p>
  </div>

  <!-- REVIEW TEXT -->
  <div class="review-section-card">
    <div style="font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--maroon);margin-bottom:6px;">Update Your Written Review <span style="color:var(--grey);font-size:0.85rem;">(Optional)</span></div>
    <textarea id="reviewText" class="rm-input" style="min-height:150px;" placeholder="Describe your experience...">{{ review.review_text or '' }}</textarea>
  </div>

  <!-- SUBMIT -->
  <div class="review-section-card">
    <div class="choice-grid">
      <button class="btn btn-outline" onclick="submitUpdate(true)"><i class="fa-solid fa-star"></i> Rating Only</button>
      <button class="btn btn-primary" onclick="submitUpdate(false)"><i class="fa-solid fa-pen"></i> Update Full Review</button>
    </div>
  </div>

</div>

<script>
let selectedRating = {{ review.rating }};
const labels = ['','Poor','Fair','Good','Great','Excellent'];

function setRating(val) {
  selectedRating = val;
  document.querySelectorAll('.rv-star').forEach((btn, i) => btn.classList.toggle('filled', i < val));
  document.getElementById('ratingLabel').textContent = labels[val] + ' — ' + val + '/5';
}

async function submitUpdate(ratingOnly) {
  if (!selectedRating) { showToast('Please select a star rating'); return; }
  const text = document.getElementById('reviewText').value.trim();
  if (!ratingOnly && !text) { showToast('Please write your review or submit as rating only'); return; }

  try {
    const res = await fetch("{{ url_for('review.update_review', order_id=order.order_id) }}", {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ rating: selectedRating, review_text: ratingOnly ? '' : text, rating_only: ratingOnly })
    });
    const data = await res.json();
    showToast(data.message);
    if (data.success) setTimeout(() => window.location.href = "{{ url_for('review.my_review', order_id=order.order_id) }}", 1500);
  } catch { showToast('Something went wrong'); }
}
</script>
{% endblock %}
