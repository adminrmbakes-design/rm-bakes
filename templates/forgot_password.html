<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — RM Bakes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">RM BAKES</div>
    <div class="auth-tagline">Account Recovery</div>
    <h2 class="auth-title">Reset Password</h2>
    <p class="auth-sub">Enter your registered email and we'll send a secure OTP</p>

    {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}
      {% for category, message in messages %}<div class="auth-flash {{ category }}">{{ message }}</div>{% endfor %}
    {% endif %}{% endwith %}

    <form method="POST" style="margin-top:20px;">
      <label class="rm-label">Registered Email</label>
      <input type="email" name="email" class="rm-input" placeholder="you@example.com" required>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Send OTP</button>
    </form>

    <div class="auth-divider"></div>
    <div class="auth-footer"><a href="{{ url_for('auth.login') }}">← Back to Login</a></div>
  </div>
</div>
</body>
</html>
