{% extends "base.html" %}

{% block content %}

<div class="phase2-page">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-5 col-md-7">

                <div class="glass-card settings-card mt-5">

                    <!-- =====================================
                         LOGIN HEADER
                    ====================================== -->

                    <div class="text-center mb-4">

                        <div class="profile-avatar-large mb-4">

                            ☕

                        </div>

                        <h1 class="glow-title">

                            Welcome Back

                        </h1>

                        <p class="glow-subtitle">

                            Login to continue your
                            dessert journey at RM Bakes ✨

                        </p>

                    </div>



                    <!-- =====================================
                         LOGIN FORM
                    ====================================== -->

                    <form method="POST">

                        <!-- EMAIL -->

                        <input
                            type="email"
                            name="email"
                            class="premium-input"
                            placeholder="Email Address"
                            required
                        >



                        <!-- PASSWORD -->

                        <div class="password-wrapper">

                            <input
                                type="password"
                                name="password"
                                id="password"
                                class="premium-input"
                                placeholder="Password"
                                required
                            >

                            <button
                                type="button"
                                class="toggle-password-btn"
                                onclick="togglePassword()"
                            >

                                👁

                            </button>

                        </div>



                        <!-- FORGOT PASSWORD -->

                        <div class="text-end mb-4">

                            <a
                                href="{{ url_for('password_reset.forgot_password') }}"
                                class="text-decoration-none"
                                style="
                                    color:#ffcc8a;
                                    font-weight:700;
                                "
                            >

                                Forgot Password?

                            </a>

                        </div>



                        <!-- LOGIN BUTTON -->

                        <button
                            type="submit"
                            class="premium-btn w-100"
                        >

                            Login ✨

                        </button>

                    </form>



                    <!-- =====================================
                         AUTH SWITCH
                    ====================================== -->

                    <div class="text-center mt-5">

                        <p
                            class="mb-3"
                            style="
                                color:rgba(255,255,255,0.7);
                            "
                        >

                            Don’t have an account?

                        </p>

                        <a
                            href="{{ url_for('auth.register') }}"
                            class="premium-btn green-btn text-decoration-none d-inline-block"
                        >

                            Create Account 🌙

                        </a>

                    </div>



                    <!-- =====================================
                         RECOVER ACCOUNT
                    ====================================== -->

                    <div class="text-center mt-4">

                        <a
                            href="#"
                            id="recoverDeletedAccountBtn"
                            class="text-decoration-none"
                            style="
                                color:#ff8c8c;
                                font-weight:700;
                            "
                        >

                            Recover Deleted Account ♻️

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>



<!-- =====================================
     LOGIN JS
===================================== -->

<script>



// ========================================
// TOGGLE PASSWORD
// ========================================

function togglePassword(){

    const passwordInput =
        document.getElementById(
            "password"
        );



    if(passwordInput.type === "password"){

        passwordInput.type = "text";

    }else{

        passwordInput.type = "password";

    }

}



// ========================================
// RECOVER ACCOUNT PLACEHOLDER
// ========================================

const recoverDeletedAccountBtn =
    document.getElementById(
        "recoverDeletedAccountBtn"
    );



recoverDeletedAccountBtn.addEventListener(
    "click",
    () => {

        alert(
            "Deleted account recovery with Gmail OTP is coming soon 😭🔥"
        );

    }
);

</script>

{% endblock %}
