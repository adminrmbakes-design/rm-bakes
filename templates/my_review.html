{% extends "base.html" %}

{% block content %}

<div class="review-memory-page">

    <div class="memory-card">

        <div class="memory-icon">

            💌

        </div>

        <h1 class="memory-title">

            My Sweet Experience

        </h1>

        <p class="memory-subtitle">

            A little memory preserved forever 🌸

        </p>

        <div class="rating-display">

            {% for i in range(review.rating) %}

                ⭐

            {% endfor %}

        </div>

        <div class="review-text-card">

            "{{ review.review_text }}"

        </div>

        <div class="review-date">

            {{ review.created_at.strftime(
                "%d %B %Y"
            ) }}
        </div>

        <div class="review-actions">

            <a
                href="{{ url_for(
                    'review.edit_review',
                    review_id=review.review_id
                ) }}"
                class="memory-btn"
            >

                ✏️ Edit

            </a>

            <form
                method="POST"
                action="{{ url_for(
                'review.delete_review',
                review_id=review.review_id
                ) }}"
                
                onsubmit="
                    return confirm(
                'Delete this memory forever? 💔'
                );"
            >

                <button
                    type="submit"
                    class="memory-btn delete-btn"
                >

                   🗑 Delete
                </button>

            </form>

        </div>

    </div>

</div>


<style>


.review-memory-page{

    max-width:800px;

    margin:auto;

    padding:30px;

}

.memory-card{

    background:
        linear-gradient(
            135deg,
            rgba(255,192,203,0.12),
            rgba(255,215,0,0.08)
        );

    border-radius:32px;

    padding:40px;

    text-align:center;

    backdrop-filter:blur(16px);

    box-shadow:
        0 0 35px
        rgba(255,180,220,0.12);

}

.memory-icon{

    font-size:4rem;

    margin-bottom:15px;

}

.memory-title{

    color:#ffd9f2;

    font-weight:900;

}

.memory-subtitle{

    color:#f6d7a7;

}

.rating-display{

    font-size:2rem;

    margin:20px 0;

}

.review-text-card{

    background:
        rgba(255,255,255,0.06);

    padding:25px;

    border-radius:24px;

    margin-top:25px;

    font-size:1.05rem;

    line-height:1.8;

}

.review-date{

    margin-top:18px;

    opacity:0.75;

}

.review-actions{

    display:flex;

    gap:16px;

    justify-content:center;

    margin-top:30px;

}

.memory-btn{

    text-decoration:none;

    padding:14px 28px;

    border-radius:18px;

    background:
        linear-gradient(
            135deg,
            #ff9bd2,
            #ffd67d
        );

    color:#222;

    font-weight:800;

}

.delete-btn{

    background:
        linear-gradient(
            135deg,
            #ffb6b6,
            #ff7f7f
        );

}


  
</style>



{% endblock %}
