{% extends "base.html" %}

{% block content %}

<a href="{{ url_for('product.products') }}"
   class="floating-close-btn">

    ×

</a>

<div class="container
   product-detail-page">

    <!-- IMAGE -->

    <div class="product-details-image-wrapper">

       {% if product.product_image %}

       <img
          src="{{ get_product_image(product.product_image) }}"
          alt="{{ product.product_name }}"
          class="product-details-image"
         >

       {% else %}

       {% endif %}

    </div>


</div> <!-- CONTAINER END -->


  

   
   
   <style>

.price-favourite-row{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:20px;

}



.favourite-btn-detail{

    width:75px;

    height:75px;

    border:none;

    border-radius:24px;

    font-size:32px;

    cursor:pointer;

    background:

        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    transition:0.45s ease;

    box-shadow:

        0 0 22px rgba(255,0,100,0.12);

}



.favourite-btn-detail:hover{

    transform:
        scale(1.08)
        rotate(-6deg);

}



.favourite-btn-detail.active{

    background:

        linear-gradient(
            135deg,
            #ff004c,
            #ff66a3
        );

    box-shadow:

        0 0 35px rgba(255,0,120,0.65);

}



.favourite-btn-detail:active{

    transform:scale(0.92);

}

.review-summary{

    margin-top:25px;

    margin-bottom:25px;

}

.review-rating{

    font-size:1.2rem;

    font-weight:700;

    color:#ffd700;

    margin-bottom:12px;

}

.view-reviews-btn{

    display:inline-block;

    padding:12px 22px;

    border-radius:18px;

    text-decoration:none;

    color:white;

    background:

        linear-gradient(
            135deg,
            #ff77aa,
            #ffcc88
        );

    box-shadow:

        0 0 25px rgba(
            255,
            180,
            120,
            0.4
        );

    transition:0.35s ease;

}

.view-reviews-btn:hover{

    transform:translateY(-3px);

}

</style>
   
   

<script>

function showToast(message){

    const toast =
        document.createElement("div");

    toast.className =
        "custom-toast";

    toast.innerText =
        message;

    document.body.appendChild(toast);

    setTimeout(() => {

        toast.classList.add("show");

    }, 100);

    setTimeout(() => {

        toast.classList.remove("show");

        setTimeout(() => {

            toast.remove();

        }, 400);

    }, 2500);
}


async function toggleFavourite(
    productId,
    isLoggedIn
){

    if(!isLoggedIn){

        showToast(
            "Login to add Favourites..❤️"
        );

        setTimeout(() => {

            window.location.href =
                "/login";

        }, 1400);

        return;
    }

    try{

        const response =
            await fetch(

                `/toggle_favourite/${productId}`,

                {
                    method:"POST"
                }

            );



        const data =
            await response.json();



        const favouriteBtn =
            document.getElementById(
                "favouriteBtn"
            );



        if(data.action === "added"){

            favouriteBtn.classList.add(
                "active"
            );

            showToast(
                "Added to favourites ❤️"
            );

        }else{

            favouriteBtn.classList.remove(
                "active"
            );

            showToast(
                "Removed from favourites 💔"
            );

        }

    }catch(error){

        console.log(error);

        showToast(
            "Something went wrong 😭"
        );

    }

}
   
   
   
async function addToCart(
    productId,
    isLoggedIn
){

    if(!isLoggedIn){

        showToast(
            "Login to add items in cart 😭"
        );

        setTimeout(() => {

            window.location.href =
                "/login";

        }, 1400);

        return;
    }

    const response = await fetch(

        `/add_to_cart/${productId}`,

        {
            method: "POST"
        }

    );

    const data = await response.json();

    if(data.success){

        showToast(
            data.message
        );

    }else{

        showToast(
            "Something went wrong 😭"
        );
    }
}

</script>
   
   
</div>

{% endblock %}
