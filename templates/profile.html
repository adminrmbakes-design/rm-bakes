{% extends "base.html" %}
{% block content %}

<!-- Profile Hero -->
<div class="profile-hero">
  <h1>{{ current_user.username }}</h1>
  <p>Welcome back — your sweet corner awaits</p>
  <div class="member-badge">★ RM Bakes Member</div>
</div>

<!-- Quick Actions -->
<div class="profile-quick-grid">
  <a href="{{ url_for('order.my_orders') }}" class="quick-btn">
    <span class="quick-btn-icon"><i class="fa-solid fa-box"></i></span><span>My Orders</span>
  </a>
  <a href="{{ url_for('cart.cart') }}" class="quick-btn">
    <span class="quick-btn-icon"><i class="fa-solid fa-bag-shopping"></i></span><span>Cart</span>
  </a>
  <a href="{{ url_for('profile.account_settings') }}" class="quick-btn">
    <span class="quick-btn-icon"><i class="fa-solid fa-gear"></i></span><span>Settings</span>
  </a>
  <button class="quick-btn" onclick="confirmLogout()">
    <span class="quick-btn-icon"><i class="fa-solid fa-right-from-bracket"></i></span><span>Sign Out</span>
  </button>
</div>

<!-- Profile Grid -->
<div class="profile-grid">

  <!-- Delivery Details -->
  <div class="rm-card section-card">
    <div class="section-title">Delivery Details</div>
    <label class="rm-label">Full Name</label>
    <input type="text" id="fullName" class="rm-input" placeholder="Your full name" value="{{ current_user.full_name or '' }}">
    <label class="rm-label">Phone Number</label>
    <input type="text" id="phoneNumber" class="rm-input" placeholder="10-digit number" value="{{ current_user.phone_number or '' }}">
    <label class="rm-label">Delivery Address</label>
    <textarea id="deliveryAddress" class="rm-input" placeholder="Full delivery address">{{ current_user.delivery_address or '' }}</textarea>
    <label class="rm-label">Landmark</label>
    <input type="text" id="landmark" class="rm-input" placeholder="Nearby landmark" value="{{ current_user.landmark or '' }}">
    <label class="rm-label">City</label>
    <input type="text" id="city" class="rm-input" placeholder="City" value="{{ current_user.city or '' }}">
    <label class="rm-label">Pincode</label>
    <input type="text" id="pincode" class="rm-input" placeholder="Pincode" value="{{ current_user.pincode or '' }}">
    <label class="rm-label">Google Maps Share Link</label>
    <input type="text" id="googleMapsLink" class="rm-input" placeholder="Paste Maps link" value="{{ current_user.google_maps_link or '' }}">
    <button class="btn btn-primary" id="saveProfileBtn">Save Delivery Details</button>
  </div>

  <!-- Payment + Account -->
  <div>
    <div class="rm-card section-card">
      <div class="section-title">Payment Preference</div>
      <label class="rm-label">Preferred Method</label>
      <select id="paymentMethod" class="rm-input">
        <option value="Online"  {% if current_user.preferred_payment_method != "COD"  %}selected{% endif %}>Online</option>
        <option value="COD" {% if current_user.preferred_payment_method == "COD" %}selected{% endif %}>Cash On Delivery</option>
      </select>
      <button class="btn btn-amber" id="savePaymentBtn">Save Preference</button>
    </div>

    <div class="rm-card section-card" style="margin-top:22px;">
      <div class="section-title">Account Info</div>
      <div style="display:flex;flex-direction:column;gap:12px;font-size:.9rem;color:var(--text-body);">
        <div><strong>Username:</strong> {{ current_user.username }}</div>
        <div><strong>Email:</strong> {{ current_user.email }}</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Save delivery details (FIX #6: profile update toast) ── */
document.getElementById('saveProfileBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveProfileBtn');
  btn.disabled    = true;
  btn.textContent = 'Saving…';
  showToast('Saving your details…');
  try {
    const res  = await fetch('/profile/save-details', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        full_name:       document.getElementById('fullName').value.trim(),
        phone_number:    document.getElementById('phoneNumber').value.trim(),
        delivery_address:document.getElementById('deliveryAddress').value.trim(),
        landmark:        document.getElementById('landmark').value.trim(),
        city:            document.getElementById('city').value.trim(),
        pincode:         document.getElementById('pincode').value.trim(),
        google_maps_link:document.getElementById('googleMapsLink').value.trim()
      })
    });
    const data = await res.json();
    showToast(data.success ? '✅ ' + (data.message || 'Details saved!') : '❌ ' + (data.message || 'Could not save'));
  } catch {
    showToast('❌ Network error — try again');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Save Delivery Details';
  }
});

/* ── Save payment preference ── */
document.getElementById('savePaymentBtn').addEventListener('click', async () => {
  const btn = document.getElementById('savePaymentBtn');
  btn.disabled    = true;
  btn.textContent = 'Saving…';
  showToast('Updating payment preference…');
  try {
    const res  = await fetch('/profile/save-details', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ preferred_payment_method: document.getElementById('paymentMethod').value })
    });
    const data = await res.json();
    showToast(data.success ? '✅ ' + (data.message || 'Preference saved!') : '❌ ' + (data.message || 'Could not save'));
  } catch {
    showToast('❌ Network error — try again');
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Save Preference';
  }
});
</script>
{% endblock %}
