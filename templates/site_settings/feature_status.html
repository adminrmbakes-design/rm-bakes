<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ feature_name }} — RM Bakes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/settings.css') }}">
</head>
<body>

  <main class="auth-page">
    <div class="auth-card">

      <div class="auth-brand">
        <div class="auth-badge">Coming Soon</div>
        <h1>{{ feature_name }}</h1>
        {% if description %}
        <p>{{ description }}</p>
        {% endif %}
      </div>

      <div class="security-note" role="note" style="text-align:center;">
        {{ feature_name }} is currently under implementation and will be available in an upcoming update.
      </div>

      <a href="{{ url_for('main.home') }}" class="btn btn-primary btn-lg btn-full" style="margin-top:20px;">
        Return Home
      </a>

      <div class="auth-footer">
        RM Bakes
      </div>

    </div>
  </main>

</body>
</html>
